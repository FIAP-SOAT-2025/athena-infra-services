name: API Deploy

on:
  push:
    branches: [main]
    paths: ['/**']
  pull_request:
    branches: [main]
    paths: ['/**']  
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
          - api-gateway-integration

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.0
  EKS_CLUSTER_NAME: eks-tc5-g192-athena-v1

jobs:
  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    environment: production
    outputs:
      infra-exists: ${{ steps.check-deps.outputs.infra-exists }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Dependencies
        id: check-deps
        run: |
          if aws eks describe-cluster --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }} &> /dev/null; then
            echo "infra-exists=true" >> $GITHUB_OUTPUT
            echo "EKS cluster exists"
          else
            echo "infra-exists=false" >> $GITHUB_OUTPUT
            echo "EKS cluster not found"
          fi

  terraform-apply:
    name: API Deploy
    needs: [check-dependencies]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: needs.check-dependencies.outputs.infra-exists == 'true' && (github.event.inputs.action == 'apply' || github.ref == 'refs/heads/main')
    defaults:
      run:
        working-directory: ./
    environment: production
    env:
      TF_VAR_db_user: ${{ secrets.DB_USER }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_db_name: ${{ secrets.DB_NAME }}
      TF_VAR_access_token: ${{ secrets.ACCESS_TOKEN }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      TF_VAR_aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          kubectl get nodes

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -refresh=false -parallelism=20 -out=tfplan

      - name: Terraform Apply
        run: terraform apply -parallelism=20 -auto-approve tfplan

      - name: Cleanup and Run DB Migration
        run: |
          echo "Cleaning up any existing migration job..."
          kubectl delete job db-migrate-seed-job -n athena-tc5 --ignore-not-found=true
          kubectl wait --for=delete job/db-migrate-seed-job -n athena-tc5 --timeout=60s || true
          
          echo "Creating migration job..."
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: db-migrate-seed-job
            namespace: athena-tc5
          spec:
            backoffLimit: 4
            template:
              spec:
                initContainers:
                - name: create-db-if-missing
                  image: postgres:16-alpine
                  imagePullPolicy: IfNotPresent
                  command:
                  - sh
                  - -c
                  - |
                    PGPASSWORD="\$DB_PASSWORD" psql -h "\$DB_HOST" -p "\$DB_PORT" -U "\$DB_USER" -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='\$DB_NAME'" | grep -q 1 || \
                    PGPASSWORD="\$DB_PASSWORD" psql -h "\$DB_HOST" -p "\$DB_PORT" -U "\$DB_USER" -d postgres -c "CREATE DATABASE \"\$DB_NAME\";"
                  envFrom:
                  - secretRef:
                      name: api-secrets
                containers:
                - name: migrate-db
                  image: dianabianca/tc5-athena:latest
                  imagePullPolicy: IfNotPresent
                  command:
                  - sh
                  - -c
                  - |
                    npx prisma migrate deploy && \
                    (command -v ts-node >/dev/null 2>&1 && npx prisma db seed || echo 'ts-node not found, skipping seed')
                  envFrom:
                  - configMapRef:
                      name: api-configmap
                  - secretRef:
                      name: api-secrets
                  resources:
                    requests:
                      memory: 256Mi
                      cpu: 100m
                    limits:
                      memory: 512Mi
                      cpu: 200m
                restartPolicy: Never
          EOF
          
          echo "Waiting for migration job to be ready..."
          kubectl wait --for=condition=ready pod -l job-name=db-migrate-seed-job -n athena-tc5 --timeout=120s || echo "Job pod not ready yet, checking status..."
          
          # Verificar se o job existe e seu status
          if kubectl get job db-migrate-seed-job -n athena-tc5 &> /dev/null; then
            echo "Job db-migrate-seed-job found, checking status..."
            kubectl describe job db-migrate-seed-job -n athena-tc5
            
            # Aguardar conclusão do job
            kubectl wait --for=condition=complete job/db-migrate-seed-job -n athena-tc5 --timeout=300s || {
              echo "Job did not complete in time, checking logs..."
              kubectl logs -l job-name=db-migrate-seed-job -n athena-tc5 --tail=50 || true
              kubectl describe job db-migrate-seed-job -n athena-tc5
              exit 1
            }
            
            echo "Migration job completed successfully!"
            kubectl logs -l job-name=db-migrate-seed-job -n athena-tc5 --tail=20 || true
            
          else
            echo "Job db-migrate-seed-job not found after creation attempt"
            kubectl get jobs -n athena-tc5
            exit 1
          fi

      - name: Verify API Deployment
        run: |
          echo "Waiting for API pod to be ready..."
          kubectl wait --for=condition=ready pod -l app=athena-api -n athena-tc5 --timeout=300s
          kubectl get pods -n athena-tc5
          kubectl get services -n athena-tc5

      - name: Verify Videoprocessor Deployment
        run: |
          echo "Waiting for videoprocessor pod to be ready..."
          kubectl wait --for=condition=ready pod -l app=athena-videoprocessor -n athena-tc5 --timeout=300s
          kubectl get pods -n athena-tc5 -l app=athena-videoprocessor

      - name: Get LoadBalancer URL
        id: get-url
        run: |
          echo "Waiting for LoadBalancer to get external IP..."
          sleep 60
          LB_HOSTNAME=$(kubectl get svc api-service -n athena-tc5 -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          if [ -n "$LB_HOSTNAME" ]; then
            echo "loadbalancer-url=http://$LB_HOSTNAME" >> $GITHUB_OUTPUT
            echo "LoadBalancer URL: http://$LB_HOSTNAME"
          else
            echo "LoadBalancer still provisioning..."
            echo "loadbalancer-url=pending" >> $GITHUB_OUTPUT
          fi

      - name: Health Check
        if: steps.get-url.outputs.loadbalancer-url != 'pending'
        run: |
          URL="${{ steps.get-url.outputs.loadbalancer-url }}/health"
          echo "Testing health endpoint: $URL"
          for i in {1..5}; do
            if curl -f $URL; then
              echo "Health check passed!"
              break
            else
              echo "Attempt $i failed, retrying in 30s..."
              sleep 30
            fi
          done

      - name: Output API Info
        run: |
          echo "API deployed successfully!"
          echo "Namespace: athena-tc5"
          echo "Service: api-service"
          echo "LoadBalancer: ${{ steps.get-url.outputs.loadbalancer-url }}"

  terraform-destroy:
    name: API Destroy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.action == 'destroy'
    defaults:
      run:
        working-directory: ./
    environment: production
    env:
      TF_VAR_db_user: ${{ secrets.DB_USER }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_db_name: ${{ secrets.DB_NAME }}
      TF_VAR_access_token: ${{ secrets.ACCESS_TOKEN }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Check if EKS cluster exists
        id: check-cluster
        run: |
          if aws eks describe-cluster --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }} &> /dev/null; then
            echo "cluster-exists=true" >> $GITHUB_OUTPUT
            echo "EKS cluster exists, configuring kubectl..."
          else
            echo "cluster-exists=false" >> $GITHUB_OUTPUT
            echo "EKS cluster not found, skipping kubectl configuration"
          fi

      - name: Configure kubectl
        if: steps.check-cluster.outputs.cluster-exists == 'true'
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          kubectl get nodes || echo "Failed to get nodes, but continuing..."

      - name: Terraform Init
        run: terraform init

      - name: Check Terraform State
        id: check-state
        run: |
          if [ -f "terraform.tfstate" ]; then
            echo "state-exists=true" >> $GITHUB_OUTPUT
          else
            echo "state-exists=false" >> $GITHUB_OUTPUT
            echo "No Terraform state found"
          fi

      - name: Terraform Plan Destroy
        if: steps.check-state.outputs.state-exists == 'true'
        run: terraform plan -destroy -parallelism=20 -no-color
        continue-on-error: true

      - name: Terraform Destroy
        if: steps.check-state.outputs.state-exists == 'true'
        run: |
          echo "Destroying API infrastructure..."
          terraform destroy -parallelism=20 -auto-approve

      - name: Verify Destruction
        run: |
          echo "Verifying resource destruction..."
          if [ "${{ steps.check-cluster.outputs.cluster-exists }}" == "true" ]; then
            kubectl get pods -n athena-tc5 2>/dev/null || echo "Namespace athena-tc5 destroyed or not found"
          fi
          echo "API destroy job completed"

  terraform-api-gateway-integration-deploy:
    name: API Gateway Integration Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.action == 'api-gateway-integration'
    environment: production
    defaults:
      run:
        working-directory: ./api-gateway-integration/
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check AWS Credentials
        run: aws sts get-caller-identity

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -refresh=false -parallelism=20 -out=tfplan

      - name: Terraform Apply
        run: terraform apply -parallelism=20 -auto-approve tfplan
